command_mux_node:
  ros__parameters:
    teleop_topic: /teleop/cmd_vel
    nav_topic: /nav/cmd_vel
    output_topic: /cmd_vel
    source_topic: /command_source
    estop_topic: /estop
    teleop_timeout_s: 0.25
    nav_timeout_s: 0.5
    publish_rate_hz: 50.0

gait_planner_node:
  ros__parameters:
    command_topic: /cmd_vel
    gait_mode_topic: /gait_mode
    joint_command_raw_topic: /joint_command/raw
    imu_topic: /imu/data_raw
    estop_topic: /estop
    update_rate_hz: 50.0
    default_mode: stand
    max_height_offset_m: 0.08
    use_imu_stabilization: true

safety_node:
  ros__parameters:
    raw_command_topic: /joint_command/raw
    safe_command_topic: /joint_command/safe
    estop_topic: /estop
    update_rate_hz: 100.0
    max_joint_velocity_rad_s: 6.0
    raw_command_timeout_s: 0.25

joint_command_publisher_node:
  ros__parameters:
    safe_command_topic: /joint_command/safe
    joint_command_topic: /joint_command
    joint_states_topic: /joint_states
    output_rate_hz: 100.0
    publish_joint_states_preview: true
