# Control stack parameters for Argos.
# These are loaded by control_stack.launch.py and shared across all four control nodes.
# To override a value at launch time, pass params_file:=your_custom.yaml

# ── command_mux_node ─────────────────────────────────────────────────────────
# Arbitrates between teleop, autonomous nav, and e-stop.
# Priority order: e-stop > teleop > nav > idle (zero velocity)
command_mux_node:
  ros__parameters:
    teleop_topic: /teleop/cmd_vel       # joystick publishes here
    nav_topic: /nav/cmd_vel             # autonomous navigation publishes here
    output_topic: /cmd_vel              # winner gets forwarded here
    source_topic: /command_source       # publishes which source won (teleop/nav/idle)
    estop_topic: /estop                 # Bool — true = freeze everything
    teleop_timeout_s: 0.25             # drop teleop if no message for 250 ms
    nav_timeout_s: 0.5                 # drop nav if no message for 500 ms
    publish_rate_hz: 50.0              # how often to re-publish the selected command

# ── gait_planner_node ────────────────────────────────────────────────────────
# Converts cmd_vel Twist commands into raw joint angles.
# Supports four modes: crouch, stand, crawl (one foot), trot (diagonal pairs)
gait_planner_node:
  ros__parameters:
    command_topic: /cmd_vel             # receives the muxed velocity command
    gait_mode_topic: /gait_mode         # String: "crouch" / "stand" / "crawl" / "trot"
    joint_command_raw_topic: /joint_command/raw
    imu_topic: /imu/data_raw            # IMU orientation from the ESP32
    estop_topic: /estop
    update_rate_hz: 50.0               # control loop rate (must match dt in Config.py)
    default_mode: crouch               # mode on startup — robot sits until commanded

    # Height adjustment range around the default standing height (-0.165 m)
    max_height_offset_m: 0.08          # ±8 cm range via linear.z in cmd_vel

    # IMU-based body stabilization — counteracts tilt measured by the IMU
    use_imu_stabilization: true
    imu_filter_alpha: 0.15             # low-pass weight (0=no update, 1=raw IMU)
    stabilization_roll_gain: 0.6       # how aggressively to correct roll tilt
    stabilization_pitch_gain: 0.6      # how aggressively to correct pitch tilt
    stabilization_max_correction_rad: 0.25  # clamp so one bad IMU reading can't flip the robot

    # Push recovery — widens the stance and freezes walking when the robot is shoved
    enable_push_recovery: true
    push_recovery_tilt_threshold_rad: 0.18  # ~10 degrees — tilt that triggers recovery
    push_recovery_hold_s: 1.0          # how long to hold the wide stance after tilt clears
    recovery_stance_scale_x: 1.05     # widen front-back by 5%
    recovery_stance_scale_y: 1.12     # widen left-right by 12%
    recovery_height_offset_m: -0.01   # lower the body 1 cm for a lower center of gravity

# ── safety_node ──────────────────────────────────────────────────────────────
# Rate-limits joint commands so servos can't be commanded to jump instantly.
# Also enforces joint limits and handles e-stop by commanding crouch.
safety_node:
  ros__parameters:
    raw_command_topic: /joint_command/raw
    safe_command_topic: /joint_command/safe
    estop_topic: /estop
    update_rate_hz: 100.0              # runs faster than gait_planner to not miss commands
    max_joint_velocity_rad_s: 6.0     # max speed per joint — raise if motion feels sluggish
    raw_command_timeout_s: 0.25       # freeze if no raw command arrives within this window

# ── joint_command_publisher_node ─────────────────────────────────────────────
# Buffers the latest safe command and re-publishes at a steady rate for the MCU.
# Also mirrors to /joint_states so RViz shows the live commanded pose.
joint_command_publisher_node:
  ros__parameters:
    safe_command_topic: /joint_command/safe
    joint_command_topic: /joint_command   # the MCU subscribes here via micro-ROS
    joint_states_topic: /joint_states     # RViz reads this for robot model visualization
    output_rate_hz: 100.0               # MCU expects 100 Hz — keep this in sync with firmware
    publish_joint_states_preview: true   # set false to reduce CPU if RViz is not running
