command_mux_node:
  ros__parameters:
    teleop_topic: /teleop/cmd_vel
    nav_topic: /nav/cmd_vel
    output_topic: /cmd_vel
    source_topic: /command_source
    estop_topic: /estop
    teleop_timeout_s: 0.25
    nav_timeout_s: 0.5
    publish_rate_hz: 50.0

gait_planner_node:
  ros__parameters:
    command_topic: /cmd_vel
    gait_mode_topic: /gait_mode
    joint_command_raw_topic: /joint_command/raw
    imu_topic: /imu/data_raw
    estop_topic: /estop
    update_rate_hz: 50.0
    default_mode: crouch
    max_height_offset_m: 0.08
    use_imu_stabilization: true
    imu_filter_alpha: 0.15
    stabilization_roll_gain: 0.6
    stabilization_pitch_gain: 0.6
    stabilization_max_correction_rad: 0.25
    enable_push_recovery: true
    push_recovery_tilt_threshold_rad: 0.18
    push_recovery_hold_s: 1.0
    recovery_stance_scale_x: 1.05
    recovery_stance_scale_y: 1.12
    recovery_height_offset_m: -0.01
    foothold_candidate_topic: /foothold/candidates
    foothold_contact_modes_topic: /foothold/contact_modes
    foothold_adjusted_topic: /foothold/adjusted
    foothold_status_topic: /foothold/status
    enable_foothold_adjustments: true
    block_on_unsafe_footholds: false
    foothold_update_timeout_s: 0.4

foothold_checker_node:
  ros__parameters:
    candidate_topic: /foothold/candidates
    contact_modes_topic: /foothold/contact_modes
    adjusted_topic: /foothold/adjusted
    status_topic: /foothold/status
    safe_topic: /foothold/safe
    marker_topic: /foothold/markers
    depth_image_topic: /camera/camera/aligned_depth_to_color/image_raw
    camera_info_topic: /camera/camera/aligned_depth_to_color/camera_info
    base_frame: base_link
    update_rate_hz: 10.0
    search_radius_m: 0.04
    search_step_m: 0.02
    support_radius_m: 0.025
    patch_radius_px: 3
    min_support_samples: 5
    max_height_error_m: 0.03
    max_height_std_m: 0.012
    max_height_span_m: 0.03
    min_depth_m: 0.05
    max_depth_m: 1.5

safety_node:
  ros__parameters:
    raw_command_topic: /joint_command/raw
    safe_command_topic: /joint_command/safe
    estop_topic: /estop
    update_rate_hz: 100.0
    max_joint_velocity_rad_s: 6.0
    raw_command_timeout_s: 0.25

joint_command_publisher_node:
  ros__parameters:
    safe_command_topic: /joint_command/safe
    joint_command_topic: /joint_command
    joint_states_topic: /joint_states
    output_rate_hz: 100.0
    publish_joint_states_preview: true
