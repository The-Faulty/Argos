# Mission stack parameters for Argos.
# Loaded by mission_stack.launch.py — only needed when running the search-and-rescue stack.
# Enable with: ros2 launch quadruped_bringup full_system.launch.py enable_mission:=true

# ── thermal_node ─────────────────────────────────────────────────────────────
# Simulated MLX90640 thermal camera — generates a fake 32x24 float32 image.
# Replace this node with a real MLX90640 driver when the hardware is available.
thermal_node:
  ros__parameters:
    image_topic: /thermal/image_raw       # where to publish the thermal image
    camera_info_topic: /thermal/camera_info
    frame_id: thermal_link                # TF frame the camera is mounted to
    publish_rate_hz: 4.0                 # MLX90640 runs at 4 Hz — keep this matched
    ambient_temperature_c: 22.0          # background temperature for the simulation
    hot_spot_temperature_c: 36.0         # simulated victim temperature
    enable_hot_spot: true                # set false to simulate an empty scene
    animate_hot_spot: true               # moves the hot spot so you can test tracking

# ── victim_detector_node ─────────────────────────────────────────────────────
# Finds warm blobs in the thermal image that could be people.
# Detection logic: threshold above median → connected components → filter by size
victim_detector_node:
  ros__parameters:
    image_topic: /thermal/image_raw
    detections_topic: /victim_detections  # publishes RViz MarkerArray with sphere markers
    detection_count_topic: /mission/detection_count  # Int32 — how many victims found this frame
    relative_threshold_c: 8.0            # pixel must be this many degrees above median to count
    min_cluster_pixels: 3               # ignore blobs smaller than this (filters noise)
    min_victim_temp_c: 30.0             # lower bound for human body temperature
    max_victim_temp_c: 42.0             # upper bound — anything hotter is probably a hot surface
    assumed_range_m: 1.2               # how far away to project detections into 3D space

# ── gas_mapping_node ─────────────────────────────────────────────────────────
# Builds a 2D occupancy-style map of gas concentration as the robot walks around.
# Subscribes to /gas (Float32) and odometry, publishes an OccupancyGrid to /hazard_map.
# NOTE: assumes odometry is already in the map frame — no TF lookup is done.
gas_mapping_node:
  ros__parameters:
    gas_topic: /gas                      # raw gas sensor reading (Float32, 0.0–1.0 normalized)
    odometry_topic: /odometry/filtered   # robot pose in the map frame
    hazard_map_topic: /hazard_map        # OccupancyGrid output — view in RViz
    map_frame: map
    publish_rate_hz: 1.0                # grid is re-published once per second
    grid_width_m: 10.0                  # total map width in meters
    grid_height_m: 10.0                 # total map height in meters
    resolution_m: 0.10                  # each cell is 10 cm × 10 cm
    gas_baseline: 0.0                   # reading considered "clean air"
    gas_alert_threshold: 1.0            # reading that maps to 100% on the grid
    kernel_radius_cells: 2             # spread each reading over a 5-cell diameter circle
    decay_per_publish: 0.99            # cells slowly fade — 0.99 = 1% decay per second

# ── mission_orchestrator_node ────────────────────────────────────────────────
# State machine that drives the mission: IDLE → EXPLORE → DETECT → REPORT → CONTINUE
# Controls gait mode and monitors detections to decide when to transition states.
mission_orchestrator_node:
  ros__parameters:
    estop_topic: /estop
    gait_mode_topic: /gait_mode          # sends "crawl" during EXPLORE, "stand" during REPORT
    state_topic: /mission/state          # publishes current state as a String
    detection_count_topic: /mission/detection_count  # listens for victim detections
    publish_rate_hz: 5.0                # state machine ticks at 5 Hz
    autostart_explore: true             # go straight to EXPLORE on startup (no manual trigger)
    detection_hold_s: 2.0              # must see a detection for this long before entering DETECT
    report_hold_s: 3.0                 # stay in REPORT for this long before moving on
    continue_hold_s: 1.0               # brief pause after REPORT before resuming EXPLORE
